# =============================================================================
# Base Configuration — Shared across ALL scenarios (S1–S4)
# DO NOT modify per-scenario. Override in s1_raw.yaml, s2_hvi_cidnet.yaml, etc.
# =============================================================================

# --- Reproducibility ---
seed: 42

# --- YOLO Training ---
yolo:
  model: "yolo11n.pt"          # YOLOv11 nano
  imgsz: 640
  epochs: 50
  batch: 16
  patience: 15
  optimizer: "AdamW"
  workers: 4
  device: 0
  exist_ok: true
  pretrained: true

  # Overfitting Tweaks
  warmup_epochs: 5.0
  weight_decay: 0.0005
  lr0: 0.005
  lrf: 0.01
  momentum: 0.937

  # Augmentation — IDENTICAL for all scenarios (fairness)
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.25
  degrees: 0.0
  translate: 0.15
  scale: 0.7
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.2
  copy_paste: 0.1
  auto_augment: randaugment
  erasing: 0.2

  # Color
  bgr: 0.0

  # Validation
  conf: 0.001                   # Confidence threshold for val (Ultralytics default)
  iou: 0.7                     # NMS IoU threshold for val

# --- Image Resize (pre-enhancement) ---
resize:
  target_size: 640              # Longest side, preserve aspect ratio
  interpolation: "INTER_AREA"   # Best for downscaling

# --- NR Metrics ---
nr_metrics:
  sample_size: 1000             # Random sample from test set
  metrics: ["niqe", "brisque"]  # LOE computed separately (needs raw-enhanced pair)

# --- Latency Measurement ---
latency:
  warmup: 50                    # Warmup iterations
  iterations: 200               # Measurement iterations
  input_size: [640, 640]        # Fixed input for timing

# --- Dataset ---
dataset:
  num_classes: 12
  class_names:
    0: "Bicycle"
    1: "Boat"
    2: "Bottle"
    3: "Bus"
    4: "Car"
    5: "Cat"
    6: "Chair"
    7: "Cup"
    8: "Dog"
    9: "Motorbike"
    10: "People"
    11: "Table"

# --- Quick Test Mode ---
# Set to true for pipeline validation (1 epoch, small subset)
quick_test: false
quick_test_epochs: 1
quick_test_batch: 8
