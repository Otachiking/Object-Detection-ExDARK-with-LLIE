# =============================================================================
# Path Configuration — Auto-detects Colab vs Local
# =============================================================================
#
# Google Drive layout (Colab):
#   TA-IQBAL/
#     data/Exdark_original/        -- source ExDark dataset
#     model_cache/                  -- LLIE pretrained weights
#     prepared/                     -- shared YOLO-format dataset & splits
#       ExDark_yolo/
#       ExDark_yolo_labels/
#       splits/
#     scenarios/                    -- per-scenario outputs
#       S1_Raw/
#         runs/                     -- training output (Ultralytics)
#         evaluation/               -- metrics.json, flops.json, latency.json, ...
#       S2_HVI_CIDNet/
#         enhanced/                 -- enhanced images (YOLO structure)
#         runs/
#         evaluation/
#       S3_RetinexFormer/  ...
#       S4_LYT_Net/        ...
# =============================================================================

# Google Colab (primary execution environment)
colab:
  drive_root: "/content/drive/MyDrive/KULIAH-S1INFORMATIKA/TA-IQBAL"
  project_root: "/content/TA-IQBAL-ObjectDetectionExDARKwithLLIE"

  data:
    exdark_original: "${drive_root}/data/Exdark_original"

  model_cache: "${drive_root}/model_cache"

# Kaggle Notebook
kaggle:
  drive_root: "/kaggle/working"
  project_root: "/kaggle/working/TA-IQBAL-ObjectDetectionExDARKwithLLIE"

  data:
    # Add ExDark as Kaggle Dataset (nama default: "exdark-dataset")
    # → muncul di /kaggle/input/exdark-dataset/
    # Ubah path di bawah jika nama dataset berbeda.
    exdark_original: "/kaggle/input/exdark-dataset"

  model_cache: "/kaggle/working/model_cache"

  # Pre-uploaded LLIE weights (Kaggle Dataset: llie-model-cache)
  # Flat structure: /kaggle/input/llie-model-cache/{filename}.pth
  # Mapping ke model_cache dilakukan di notebook setup cell.
  model_weights_input: "/kaggle/input/llie-model-cache"

# Local development (Windows)
local:
  drive_root: "c:/CODE/KULIAH/TA"
  project_root: "c:/CODE/KULIAH/TA/TA-IQBAL-ObjectDetectionExDARKwithLLIE"

  data:
    exdark_original: "${drive_root}/DATASET/ExDark - REPO"

  model_cache: "${project_root}/outputs/model_cache"

# --- ExDark Structure (relative to exdark_original) ---
exdark:
  images_dir: "Dataset"                  # Contains Bicycle/, Boat/, ... Table/
  groundtruth_dir: "Groundtruth"         # Contains Bicycle/, Boat/, ... Table/ + imageclasslist.txt
  classlist_file: "Groundtruth/imageclasslist.txt"

# --- Class Folder Names (order matters — maps to class ID) ---
class_folders:
  - "Bicycle"    # 0
  - "Boat"       # 1
  - "Bottle"     # 2
  - "Bus"        # 3
  - "Car"        # 4
  - "Cat"        # 5
  - "Chair"      # 6
  - "Cup"        # 7
  - "Dog"        # 8
  - "Motorbike"  # 9
  - "People"     # 10
  - "Table"      # 11

# --- ExDark Annotation Class Name → YOLO Class ID ---
class_name_to_id:
  Bicycle: 0
  Boat: 1
  Bottle: 2
  Bus: 3
  Car: 4
  Cat: 5
  Chair: 6
  Cup: 7
  Dog: 8
  Motorbike: 9
  People: 10
  Table: 11

# --- imageclasslist.txt Column 2 → Class Folder ---
class_id_to_folder:
  1: "Bicycle"
  2: "Boat"
  3: "Bottle"
  4: "Bus"
  5: "Car"
  6: "Cat"
  7: "Chair"
  8: "Cup"
  9: "Dog"
  10: "Motorbike"
  11: "People"
  12: "Table"

# --- Split Mapping (imageclasslist.txt Column 5) ---
split_id_to_name:
  1: "train"
  2: "val"
  3: "test"
