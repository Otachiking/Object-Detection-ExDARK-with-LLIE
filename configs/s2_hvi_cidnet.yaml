# =============================================================================
# Scenario S2 — HVI-CIDNet Enhancement → YOLOv11n
# =============================================================================

scenario:
  name: "s2_hvi_cidnet"
  description: "HVI-CIDNet (LOL-v1 wperc) enhanced ExDark → YOLOv11n"
  enhancer: "hvi_cidnet"

enhancer_config:
  repo_url: "https://github.com/Fediory/HVI-CIDNet.git"
  weight_source: "llie-weights"    # Priority: llie-weights/ (repo) > cache > huggingface
  weight_repo: "Fediory/HVI-CIDNet-LOLv1-wperc"
  weight_file: "hvi_cidnet_LOL_v1.pth"
  # Inference parameters (tunable)
  alpha_s: 1.0
  alpha_i: 1.0
  gamma: 1.0
